<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>保坂歯科医院 AIアシスタント</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0e7490;
  --primary-light: #ecfeff;
  --primary-dark: #065a73;
  --accent: #06b6d4;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-light: #64748b;
  --border: #e2e8f0;
  --success: #10b981;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); height: 100dvh; display: flex; flex-direction: column; color: var(--text); -webkit-font-smoothing: antialiased; }

/* Header */
.header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 16px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
.header-avatar { width: 46px; height: 46px; background: rgba(255,255,255,0.2); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; backdrop-filter: blur(10px); }
.header-info { flex: 1; }
.header-name { font-size: 16px; font-weight: 700; color: #fff; }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
.header-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #a7f3d0; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; backdrop-filter: blur(10px); }
.header-dot { width: 7px; height: 7px; background: #34d399; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.85)} }

/* Chat */
.chat { flex: 1; overflow-y: auto; padding: 20px 16px 180px; scroll-behavior: smooth; }
.date-label { text-align: center; margin: 8px 0 16px; }
.date-label span { font-size: 11px; color: var(--text-light); background: var(--bg); padding: 4px 14px; border-radius: 12px; border: 1px solid var(--border); }

.msg { display: flex; margin-bottom: 10px; gap: 8px; animation: msgIn .35s cubic-bezier(.16,1,.3,1); }
.msg.user { flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 10px; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; align-self: flex-end; }
.msg.user .msg-avatar { background: transparent; display: none; }
.bubble { max-width: 78%; padding: 12px 16px; font-size: 14px; line-height: 1.75; white-space: pre-line; word-break: break-word; }
.msg.bot .bubble { background: var(--card); color: var(--text); border-radius: 4px 20px 20px 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.msg.user .bubble { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border-radius: 20px 4px 20px 20px; }
.msg-time { font-size: 10px; color: var(--text-light); align-self: flex-end; flex-shrink: 0; }
@keyframes msgIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* Action buttons (in chat) */
.action-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.action-btn { padding: 10px 16px; font-size: 13px; font-weight: 500; border: 2px solid var(--accent); background: var(--primary-light); color: var(--primary-dark); border-radius: 12px; cursor: pointer; transition: all .15s; }
.action-btn:hover, .action-btn:active { background: var(--accent); color: #fff; }

/* Calendar */
.calendar { background: var(--card); border-radius: 16px; padding: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-top: 10px; }
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.cal-title { font-size: 15px; font-weight: 700; }
.cal-nav { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 14px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; text-align: center; }
.cal-day-label { font-size: 11px; color: var(--text-light); font-weight: 500; padding: 4px; }
.cal-day { font-size: 13px; padding: 8px 4px; border-radius: 10px; cursor: pointer; transition: all .15s; }
.cal-day:hover { background: var(--primary-light); }
.cal-day.available { font-weight: 700; color: var(--primary); }
.cal-day.unavailable { color: #cbd5e1; cursor: default; }
.cal-day.unavailable:hover { background: transparent; }
.cal-day.selected { background: var(--accent); color: #fff; }
.cal-day.today { border: 2px solid var(--accent); }

/* Time slots */
.time-slots { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 10px; }
.time-slot { padding: 10px 8px; font-size: 13px; font-weight: 500; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; text-align: center; transition: all .15s; }
.time-slot:hover, .time-slot.selected { border-color: var(--accent); background: var(--primary-light); color: var(--primary-dark); }

/* Confirm card */
.confirm-card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-top: 10px; }
.confirm-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
.confirm-row:last-of-type { border: none; }
.confirm-label { color: var(--text-light); }
.confirm-value { font-weight: 700; }
.confirm-btns { display: flex; gap: 10px; margin-top: 16px; }
.btn-confirm { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; }
.btn-secondary { background: #f1f5f9; color: var(--text-light); }

/* Success animation */
.success-card { background: var(--card); border-radius: 16px; padding: 28px 20px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); margin-top: 10px; }
.success-icon { font-size: 48px; margin-bottom: 12px; animation: pop .4s cubic-bezier(.16,1,.3,1); }
@keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
.success-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--success); }
.success-detail { font-size: 13px; color: var(--text-light); line-height: 1.6; }
.reservation-id { font-size: 20px; font-weight: 700; color: var(--primary); letter-spacing: 2px; margin: 12px 0; }

/* Typing indicator */
.typing { display: inline-flex; gap: 5px; padding: 12px 16px; }
.typing span { width: 8px; height: 8px; background: #94a3b8; border-radius: 50%; animation: dotBounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes dotBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-10px)} }

/* Bottom */
.bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); z-index: 10; padding-bottom: env(safe-area-inset-bottom); }
.quick { display: flex; gap: 8px; padding: 10px 16px 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.quick::-webkit-scrollbar { display: none; }
.quick-btn { flex-shrink: 0; padding: 8px 16px; font-size: 13px; font-weight: 500; border: 1.5px solid #bae6fd; background: #f0f9ff; color: var(--primary); border-radius: 24px; cursor: pointer; transition: all .15s; white-space: nowrap; }
.quick-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); transform: scale(.96); }
.input-row { display: flex; gap: 8px; padding: 8px 16px 10px; align-items: center; }
.input-row input { flex: 1; border: 1.5px solid var(--border); border-radius: 24px; padding: 11px 20px; font-size: 14px; font-family: inherit; outline: none; transition: border .2s; background: var(--bg); }
.input-row input:focus { border-color: var(--accent); background: #fff; }
.send-btn { width: 44px; height: 44px; border: none; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
.send-btn:disabled { background: #e2e8f0; cursor: default; transform: scale(.95); }
.send-btn:not(:disabled):active { transform: scale(.92); }
.branding { text-align: center; padding: 2px 0 6px; font-size: 10px; color: #94a3b8; }
.branding b { color: var(--primary); }
</style>
</head>
<body>

<div class="header">
  <div class="header-avatar">🦷</div>
  <div class="header-info">
    <div class="header-name">保坂歯科医院</div>
    <div class="header-sub">AI受付アシスタント</div>
  </div>
  <div class="header-badge"><span class="header-dot"></span>24時間対応</div>
</div>

<div class="chat" id="chat"></div>

<div class="bottom">
  <div class="quick" id="quick"></div>
  <div class="input-row">
    <input id="input" type="text" placeholder="ご質問を入力してください..." autocomplete="off">
    <button class="send-btn" id="sendBtn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="branding">Powered by <b>Fit AI</b></div>
</div>

<script>
const API_URL = 'https://chatbot-api-proxy.ryu-btc-ryu.workers.dev';
const QUICK = ['診療時間は？','矯正の料金','予約したい','場所・駐車場','どんな治療ができる？','ホワイトニング'];
const MENUS = ['一般歯科（虫歯等）','矯正相談','ホワイトニング','定期検診','インプラント相談','その他'];
const TIMES = ['9:00','9:30','10:00','10:30','11:00','11:30','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30'];

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const quickEl = document.getElementById('quick');
let history = [];
let bookingState = null; // null | {step, menu, date, time, name}

function now() { const d=new Date(); return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'); }

function addMsg(html, isUser, showTime=true) {
  const d = document.createElement('div');
  d.className = 'msg ' + (isUser ? 'user' : 'bot');
  let inner = '';
  if (!isUser) inner += '<div class="msg-avatar">🦷</div>';
  inner += '<div class="bubble">' + html + '</div>';
  if (showTime) inner += '<span class="msg-time">' + now() + '</span>';
  d.innerHTML = inner;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = '<div class="msg-avatar">🦷</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { const e=document.getElementById('typing'); if(e)e.remove(); }

async function aiReply(message) {
  history.push({ role: 'user', content: message });
  showTyping();
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history: history.slice(-10) })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || 'すみません、エラーが発生しました。';
    history.push({ role: 'assistant', content: reply });
    addMsg(reply.replace(/\n/g,'<br>'), false);
  } catch(e) {
    hideTyping();
    addMsg('通信エラーが発生しました。再度お試しください。', false);
  }
}

// ── Booking flow ──
function startBooking() {
  bookingState = { step: 'menu' };
  let html = 'ご予約ありがとうございます😊<br>診療メニューをお選びください👇<br><div class="action-btns">';
  MENUS.forEach(m => { html += '<button class="action-btn" onclick="selectMenu(\''+m+'\')">'+m+'</button>'; });
  html += '</div>';
  addMsg(html, false);
}

function selectMenu(menu) {
  bookingState.menu = menu;
  bookingState.step = 'date';
  addMsg(menu, true);
  showCalendar();
}

function showCalendar() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  let html = 'ご希望の日付をお選びください📅<div class="calendar"><div class="cal-header"><span class="cal-title">' + year + '年 ' + monthNames[month] + '</span></div><div class="cal-grid">';
  ['日','月','火','水','木','金','土'].forEach(d => { html += '<div class="cal-day-label">'+d+'</div>'; });
  for (let i=0; i<firstDay; i++) html += '<div class="cal-day"></div>';
  for (let d=1; d<=daysInMonth; d++) {
    const date = new Date(year, month, d);
    const dow = date.getDay();
    const isPast = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const isSun = dow === 0;
    const isToday = d === today.getDate();
    if (isPast || isSun) {
      html += '<div class="cal-day unavailable'+(isToday?' today':'')+'">' + d + '</div>';
    } else {
      const dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      html += '<div class="cal-day available'+(isToday?' today':'')+'" onclick="selectDate(\''+dateStr+'\','+d+','+dow+')">' + d + '</div>';
    }
  }
  html += '</div></div>';
  addMsg(html, false);
}

function selectDate(dateStr, day, dow) {
  bookingState.date = dateStr;
  bookingState.step = 'time';
  const dowNames = ['日','月','火','水','木','金','土'];
  addMsg(dateStr.replace(/-/g,'/') + '（' + dowNames[dow] + '）', true);

  // Filter times based on day of week
  let available = [...TIMES];
  if (dow === 4) available = TIMES.filter(t => parseInt(t) < 13); // Thursday: morning only
  if (dow === 6) available = TIMES.filter(t => parseInt(t) < 17); // Saturday: until 17:00

  let html = 'ご希望の時間帯をお選びください🕐<div class="time-slots">';
  available.forEach(t => { html += '<div class="time-slot" onclick="selectTime(\''+t+'\')">'+t+'</div>'; });
  html += '</div>';
  addMsg(html, false);
}

function selectTime(time) {
  bookingState.time = time;
  bookingState.step = 'name';
  addMsg(time, true);
  addMsg('お名前をフルネームで入力してください✏️', false);
}

function confirmBooking(name) {
  bookingState.name = name;
  bookingState.step = 'confirm';
  addMsg(name, true);

  const html = '<div class="confirm-card">' +
    '<div style="font-size:15px;font-weight:700;margin-bottom:12px">📋 予約内容の確認</div>' +
    '<div class="confirm-row"><span class="confirm-label">診療内容</span><span class="confirm-value">'+bookingState.menu+'</span></div>' +
    '<div class="confirm-row"><span class="confirm-label">日付</span><span class="confirm-value">'+bookingState.date.replace(/-/g,'/')+'</span></div>' +
    '<div class="confirm-row"><span class="confirm-label">時間</span><span class="confirm-value">'+bookingState.time+'</span></div>' +
    '<div class="confirm-row"><span class="confirm-label">お名前</span><span class="confirm-value">'+bookingState.name+'</span></div>' +
    '<div class="confirm-btns">' +
    '<button class="btn-confirm btn-secondary" onclick="cancelBooking()">やり直す</button>' +
    '<button class="btn-confirm btn-primary" onclick="completeBooking()">✅ 予約確定</button>' +
    '</div></div>';
  addMsg(html, false);
}

function completeBooking() {
  const id = 'HSK-' + Date.now().toString(36).toUpperCase().slice(-6);
  const html = '<div class="success-card">' +
    '<div class="success-icon">✅</div>' +
    '<div class="success-title">ご予約を承りました！</div>' +
    '<div class="reservation-id">' + id + '</div>' +
    '<div class="success-detail">' +
    bookingState.date.replace(/-/g,'/') + ' ' + bookingState.time + '<br>' +
    bookingState.menu + '<br>' +
    bookingState.name + ' 様<br><br>' +
    '📍 山梨県甲府市荒川1-8-12<br>' +
    '📞 055-254-0418<br><br>' +
    '<span style="font-size:12px">キャンセルの場合は予約番号をお伝えの上<br>お電話またはこのチャットでご連絡ください</span>' +
    '</div></div>';
  addMsg(html, false);
  bookingState = null;
}

function cancelBooking() {
  bookingState = null;
  addMsg('予約をやり直します。もう一度「予約したい」とお送りください😊', false);
}

// ── Cancel flow ──
function startCancel() {
  bookingState = { step: 'cancel-id' };
  addMsg('キャンセルする予約の予約番号を入力してください。<br>（例: HSK-XXXXXX）', false);
}

function processCancel(id) {
  addMsg(id, true);
  const html = '<div class="confirm-card">' +
    '<div style="font-size:15px;font-weight:700;margin-bottom:12px">予約キャンセル</div>' +
    '<div style="font-size:14px;margin-bottom:16px">予約番号 <b>'+id+'</b> をキャンセルしますか？</div>' +
    '<div class="confirm-btns">' +
    '<button class="btn-confirm btn-secondary" onclick="addMsg(\'キャンセルを中止しました\',false);bookingState=null;">やめる</button>' +
    '<button class="btn-confirm btn-primary" style="background:#ef4444" onclick="addMsg(\'<div class=success-card><div class=success-icon>🗑️</div><div class=success-title style=color:#ef4444>キャンセル完了</div><div class=success-detail>予約番号 '+id+' をキャンセルしました。<br>またのご予約をお待ちしております。</div></div>\',false);bookingState=null;">キャンセルする</button>' +
    '</div></div>';
  addMsg(html, false);
  bookingState = null;
}

// ── Main send ──
function send(text) {
  if (!text.trim()) return;
  const t = text.trim();

  // Booking flow
  if (bookingState) {
    if (bookingState.step === 'name') { confirmBooking(t); input.value=''; sendBtn.disabled=true; return; }
    if (bookingState.step === 'cancel-id') { processCancel(t); input.value=''; sendBtn.disabled=true; return; }
  }

  addMsg(t, true);
  input.value = '';
  sendBtn.disabled = true;

  // Check for booking intent
  if (/予約したい|予約|予約する|予約お願い/.test(t) && !/キャンセル/.test(t)) { startBooking(); return; }
  if (/キャンセル/.test(t)) { startCancel(); return; }

  // AI reply
  aiReply(t);
}

// Quick buttons
QUICK.forEach(q => {
  const b = document.createElement('button');
  b.className = 'quick-btn'; b.textContent = q;
  b.onclick = () => send(q);
  quickEl.appendChild(b);
});

input.addEventListener('input', () => { sendBtn.disabled = !input.value.trim(); });
input.addEventListener('keydown', e => { if (e.key==='Enter' && input.value.trim()) send(input.value); });
sendBtn.addEventListener('click', () => { if (input.value.trim()) send(input.value); });

// Welcome
const d = new Date();
const dateStr = d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
chat.innerHTML = '<div class="date-label"><span>'+dateStr+'</span></div>';
addMsg('こんにちは！保坂歯科医院のAI受付です😊<br><br>診療に関するご質問や、ご予約の受付を承っております。<br>お気軽にお聞きください！<br><br>💡 下のボタンからもご質問いただけます', false);
</script>
</body>
</html>
